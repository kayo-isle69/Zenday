<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Flowly — Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c4a365">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="bg-mesh"></div>

<!-- TOP BAR -->
<header class="topbar">
  <a href="app.html" class="topbar-logo">
    <div class="logo-mark">₣</div>
    Flowly
  </a>
  <div class="topbar-actions">
    <button class="icon-btn" id="theme-btn" onclick="toggleTheme()">☀</button>
    <a href="settings.html" class="icon-btn" title="Settings">⚙</a>
  </div>
</header>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="app.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Dashboard
  </a>
  <a href="transactions.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Transactions
  </a>
  <a href="budget.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 6v6l4 2"/></svg>
    Budget
  </a>
  <a href="settings.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
    Settings
  </a>
</nav>

<!-- FAB -->
<button class="fab" onclick="openModal()" title="Add Transaction">+</button>

<!-- PAGE -->
<main class="page fade-up">
  <div class="page-sub" id="greeting">Good morning</div>
  <h1 class="page-title" style="margin-bottom:20px">
    <em id="month-label">March</em> Overview
  </h1>

  <!-- BALANCE HERO -->
  <div class="balance-hero" id="balance-card">
    <div class="balance-label">Net Balance</div>
    <div class="balance-amount" id="balance-display">$0.00</div>
    <div class="balance-split">
      <div class="balance-split-item">
        <span class="split-label">↑ Income</span>
        <span class="split-val inc" id="income-display">$0.00</span>
      </div>
      <div class="balance-split-item">
        <span class="split-label">↓ Expenses</span>
        <span class="split-val exp" id="expense-display">$0.00</span>
      </div>
    </div>
  </div>

  <!-- PIE CHART -->
  <div class="chart-wrap">
    <div class="chart-title">Spending Breakdown · This Month</div>
    <div class="chart-canvas-wrap" style="height:220px">
      <canvas id="pie-chart"></canvas>
    </div>
    <div id="pie-empty" class="empty" style="display:none;padding:20px">
      <div class="empty-sub">No expenses yet this month</div>
    </div>
  </div>

  <!-- BAR CHART -->
  <div class="chart-wrap">
    <div class="chart-title">6-Month Trend</div>
    <div class="chart-canvas-wrap" style="height:180px">
      <canvas id="bar-chart"></canvas>
    </div>
  </div>

  <!-- RECENT TRANSACTIONS -->
  <div class="section-label">Recent Activity</div>
  <div id="recent-list"></div>
  <a href="transactions.html" class="btn btn-outline" style="margin-top:4px">View All Transactions</a>
</main>

<!-- ADD TRANSACTION MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="maybeCloseModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">New Transaction</div>

    <div class="type-toggle">
      <button class="type-btn active-exp" id="btn-expense" onclick="setType('expense')">↓ Expense</button>
      <button class="type-btn" id="btn-income" onclick="setType('income')">↑ Income</button>
    </div>

    <div class="form-group">
      <label class="form-label">Amount</label>
      <input type="number" class="form-input" id="tx-amount" placeholder="0.00" step="0.01" min="0">
    </div>

    <div class="form-group">
      <label class="form-label">Name / Description</label>
      <input type="text" class="form-input" id="tx-name" placeholder="e.g. Grocery Store">
    </div>

    <div class="form-group">
      <label class="form-label">Category</label>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Date</label>
      <input type="date" class="form-input" id="tx-date">
    </div>

    <button class="btn btn-gold" onclick="submitTransaction()">Save Transaction</button>
    <button class="btn btn-outline" style="margin-top:10px" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="toast"></div>

<script src="app.js"></script>
<script src="charts.js"></script>
<script>
let currentType = 'expense';
let selectedCategory = 'food';
let editingId = null;

function init() {
  const now = new Date();
  document.getElementById('month-label').textContent =
    now.toLocaleString('default', { month: 'long' });

  const h = now.getHours();
  const greet = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
  const s = getSettings();
  document.getElementById('greeting').textContent = `${greet}, ${s.name}`;

  renderDashboard();
  buildCatGrid();

  // default date
  document.getElementById('tx-date').value = now.toISOString().split('T')[0];
}

function renderDashboard() {
  const now = new Date();
  const txs = getMonthTransactions(now.getFullYear(), now.getMonth());
  const { income, expenses, balance } = calcTotals(txs);

  const balEl = document.getElementById('balance-display');
  balEl.textContent = fmt(balance);
  balEl.className = 'balance-amount ' + (balance >= 0 ? 'positive' : 'negative');

  document.getElementById('income-display').textContent = fmt(income);
  document.getElementById('expense-display').textContent = fmt(expenses);

  // charts
  const catSpend = calcCategorySpend(txs);
  if (Object.keys(catSpend).length > 0) {
    document.getElementById('pie-chart').style.display = '';
    document.getElementById('pie-empty').style.display = 'none';
    renderPieChart('pie-chart', catSpend);
  } else {
    document.getElementById('pie-chart').style.display = 'none';
    document.getElementById('pie-empty').style.display = 'block';
  }
  renderBarChart('bar-chart');

  // recent (last 5)
  const recent = getTransactions().slice(0, 5);
  const list = document.getElementById('recent-list');
  if (recent.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">💸</div><div class="empty-title">No transactions yet</div><div class="empty-sub">Tap + to add your first entry</div></div>`;
    return;
  }
  list.innerHTML = recent.map(tx => txHTML(tx)).join('');
}

function txHTML(tx) {
  const cat = getCategoryInfo(tx.category);
  return `<div class="tx-item" onclick="deleteTx('${tx.id}')">
    <div class="tx-icon" style="background:${cat.color}22">${cat.emoji}</div>
    <div class="tx-info">
      <div class="tx-name">${tx.name}</div>
      <div class="tx-meta">${cat.label} · ${formatDate(tx.date)}</div>
    </div>
    <span class="tx-amount ${tx.type==='income'?'pos':'neg'}">${tx.type==='income'?'+':'-'}${fmt(tx.amount)}</span>
  </div>`;
}

function formatDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en', { month:'short', day:'numeric' });
}

function buildCatGrid() {
  document.getElementById('cat-grid').innerHTML = CATEGORIES.map(c =>
    `<div class="cat-chip ${c.id===selectedCategory?'selected':''}" onclick="selectCat('${c.id}')">
      <span>${c.emoji}</span><span>${c.label}</span>
    </div>`
  ).join('');
}

function selectCat(id) {
  selectedCategory = id;
  buildCatGrid();
}

function setType(type) {
  currentType = type;
  document.getElementById('btn-expense').className = 'type-btn' + (type==='expense'?' active-exp':'');
  document.getElementById('btn-income').className  = 'type-btn' + (type==='income' ?' active-inc':'');
}

function openModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'New Transaction';
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-name').value = '';
  document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];
  setType('expense'); selectedCategory = 'food'; buildCatGrid();
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function maybeCloseModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

function submitTransaction() {
  const amount = parseFloat(document.getElementById('tx-amount').value);
  const name   = document.getElementById('tx-name').value.trim();
  const date   = document.getElementById('tx-date').value;

  if (!amount || amount <= 0) return showToast('Enter a valid amount', 'error');
  if (!name) return showToast('Enter a description', 'error');

  addTransaction({ type: currentType, category: selectedCategory, name, amount, date });
  closeModal();
  renderDashboard();
  showToast('Transaction saved ✓');
}

function deleteTx(id) {
  if (!confirm('Delete this transaction?')) return;
  deleteTransaction(id);
  renderDashboard();
  showToast('Deleted', 'error');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
